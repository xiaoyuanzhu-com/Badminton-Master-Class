<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球大师课 - Contents</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        form { margin-top: 20px; }
        label { display: block; margin-top: 10px; }
        input, select { padding: 5px; margin-top: 3px; }
        button { margin-top: 15px; padding: 8px 16px; }
    </style>
</head>
<body>
    <nav>
        <a href="/categories">Categories</a>
        <a href="/contents">Contents</a>
        <a href="/export">Export</a>
    </nav>

    <h1>Contents</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Summary</th>
                <th>Platform</th>
                <th>Author</th>
                <th>Category</th>
                <th>Sort</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Contents}}
            <tr>
                <td>{{.ID}}</td>
                <td><a href="{{.SourceURL}}">{{.Title}}</a></td>
                <td>{{.Summary}}</td>
                <td>{{.SourcePlatform}}</td>
                <td>{{.AuthorName}}</td>
                <td>{{.CategoryName}}</td>
                <td>{{.SortOrder}}</td>
                <td>
                    <a href="/contents/{{.ID}}/edit">Edit</a>
                    <form method="POST" action="/contents/{{.ID}}/delete" style="display:inline" onsubmit="return confirm('Delete this content?')">
                        <button type="submit" style="margin:0;padding:2px 8px;">Delete</button>
                    </form>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>

    <h2>Add Content</h2>
    <form method="POST" action="/contents">
        <label>Title: <input type="text" name="title" required></label>
        <label>Summary: <input type="text" name="summary"></label>
        <label>Thumbnail URL: <input type="url" name="thumbnail_url"></label>
        <label>Source URL: <input type="url" name="source_url" required></label>
        <label>Platform:
            <select name="source_platform" required>
                <option value="bilibili">Bilibili</option>
                <option value="xiaohongshu">Xiaohongshu</option>
                <option value="douyin">Douyin</option>
                <option value="wechat">WeChat</option>
                <option value="youtube">YouTube</option>
                <option value="other">Other</option>
            </select>
        </label>
        <label>Author: <input type="text" name="author_name"></label>
        <label>Category:
            <select name="category_id" required>
                {{range .Categories}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </label>
        <label>Sort Order: <input type="number" name="sort_order" value="0"></label>
        <button type="submit">Add</button>
    </form>
</body>
</html>
