<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球大师课 - Edit Category</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
        label { display: block; margin-top: 10px; }
        input, select { padding: 5px; margin-top: 3px; }
        button { margin-top: 15px; padding: 8px 16px; }
        .cancel { margin-left: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="/categories">Categories</a>
        <a href="/contents">Contents</a>
        <a href="/export">Export</a>
    </nav>

    <h1>Edit Category</h1>

    <form method="POST" action="/categories/{{.Category.ID}}/edit">
        <label>Name: <input type="text" name="name" value="{{.Category.Name}}" required></label>
        <label>Icon: <input type="text" name="icon" value="{{.Category.Icon}}"></label>
        <label>Sort Order: <input type="number" name="sort_order" value="{{.Category.SortOrder}}"></label>
        <label>Parent:
            <select name="parent_id">
                <option value="">None</option>
                {{range .Categories}}
                <option value="{{.ID}}" {{if eq $.ParentIDValue .ID}}selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </label>
        <button type="submit">Save</button>
        <a class="cancel" href="/categories">Cancel</a>
    </form>
</body>
</html>
